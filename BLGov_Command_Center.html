<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>BL Gov Command Center</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#012D6C">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#012D6C;
  --navy-light:#0B3E8C;
  --navy-dark:#011E4A;
  --green:#00956E;
  --green-light:#02B385;
  --green-pale:#E5F5F0;
  --bg:#F4F6F8;
  --card:#FFFFFF;
  --border:#E1E6EC;
  --text:#152238;
  --text-soft:#5A6B85;
  --danger:#C4432B;
  --amber:#C98A1D;
  --radius:14px;
  --shadow:0 1px 2px rgba(1,45,108,0.06), 0 4px 16px rgba(1,45,108,0.06);
  --font-display:'Fraunces', serif;
  --font-body:'Libre Franklin', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--green-pale);}

/* ---------- PIN SCREEN ---------- */
#pin-screen{
  min-height:100vh;
  background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 55%,var(--navy-light) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 20px;
  position:relative;
  overflow:hidden;
}
#pin-screen::before{
  content:'';
  position:absolute;inset:0;
  background-image:radial-gradient(circle at 20% 20%, rgba(0,149,110,0.15), transparent 40%),
                    radial-gradient(circle at 85% 80%, rgba(0,149,110,0.12), transparent 45%);
  pointer-events:none;
}
.pin-logo-wrap{
  max-width:420px;width:82%;margin-bottom:6px;position:relative;z-index:1;
}
.pin-logo-wrap img{width:100%;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.25));}
.pin-tagline{
  color:var(--green-light);
  font-family:var(--font-display);
  font-style:italic;
  font-weight:500;
  font-size:19px;
  text-align:center;
  margin:2px 0 34px;
  letter-spacing:0.2px;
  position:relative;z-index:1;
}
.pin-card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(6px);
  border-radius:var(--radius);
  padding:28px 26px 24px;
  width:100%;max-width:340px;
  position:relative;z-index:1;
}
.pin-card h2{
  color:#fff;margin:0 0 4px;font-size:15px;font-weight:600;text-align:center;letter-spacing:0.4px;text-transform:uppercase;opacity:0.85;
}
.pin-name-display{
  text-align:center;color:#fff;font-family:var(--font-display);font-size:22px;min-height:30px;margin-bottom:14px;font-weight:600;
}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:14px 0 20px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.4);transition:all .15s;}
.pin-dot.filled{background:var(--green-light);border-color:var(--green-light);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;
  border-radius:10px;padding:16px 0;font-size:19px;font-weight:600;transition:all .12s;
}
.pin-key:active,.pin-key:hover{background:rgba(0,149,110,0.35);border-color:var(--green-light);}
.pin-key.wide{grid-column:span 1;font-size:13px;font-weight:500;}
.pin-error{color:#ff8a7a;text-align:center;font-size:13px;margin-top:14px;min-height:16px;font-weight:600;}
.pin-lockout{color:#ffd27a;text-align:center;font-size:13px;margin-top:8px;}
.switch-user-btn{
  display:block;margin:18px auto 0;background:none;border:none;color:rgba(255,255,255,0.55);
  font-size:13px;text-decoration:underline;
}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.active{display:flex;}
header.topbar{
  background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;position:sticky;top:0;z-index:50;
  box-shadow:0 2px 10px rgba(1,45,108,0.25);
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left img{width:38px;height:38px;border-radius:50%;}
.topbar-left .brand-text{font-family:var(--font-display);font-weight:600;font-size:17px;line-height:1.1;}
.topbar-left .brand-text span{display:block;font-family:var(--font-body);font-weight:400;font-size:11px;color:var(--green-light);letter-spacing:0.5px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.user-chip{
  background:rgba(255,255,255,0.1);padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.user-chip .lvl{
  background:var(--green);color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;
}
.logout-btn{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;}
.logout-btn:hover{background:rgba(255,255,255,0.2);}

nav.tabbar{
  display:flex;background:var(--navy-dark);overflow-x:auto;position:sticky;top:58px;z-index:49;
}
nav.tabbar button{
  background:none;border:none;color:rgba(255,255,255,0.55);padding:12px 18px;font-size:13.5px;font-weight:600;
  white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;
}
nav.tabbar button.active{color:#fff;border-bottom-color:var(--green);}
nav.tabbar button:hover{color:#fff;}

main{flex:1;padding:20px;max-width:1100px;width:100%;margin:0 auto;padding-bottom:60px;}
.tab-panel{display:none;animation:fadeIn .25s ease;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

h1.page-title{font-family:var(--font-display);font-size:26px;color:var(--navy);margin:0 0 4px;font-weight:600;}
.page-sub{color:var(--text-soft);font-size:13.5px;margin:0 0 20px;}

/* ---------- CARDS / GRID ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.stat-card .num{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--navy);}
.stat-card .lbl{font-size:12px;color:var(--text-soft);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:2px;}
.stat-card.accent .num{color:var(--green);}

.section-block{margin-bottom:26px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-head h2{font-family:var(--font-display);font-size:18px;color:var(--navy);margin:0;font-weight:600;}

.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:26px;}
.qa-btn{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--navy);box-shadow:var(--shadow);
}
.qa-btn:hover{border-color:var(--green);color:var(--green);}
.qa-btn .qi{width:20px;height:20px;border-radius:50%;background:var(--green-pale);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}

/* buttons */
.btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;}
.btn:hover{background:var(--navy-light);}
.btn.green{background:var(--green);}
.btn.green:hover{background:var(--green-light);}
.btn.outline{background:none;border:1px solid var(--border);color:var(--text);}
.btn.outline:hover{border-color:var(--navy);}
.btn.small{padding:6px 11px;font-size:12px;border-radius:7px;}
.btn.danger{background:var(--danger);}
.icon-btn{background:none;border:none;color:var(--text-soft);padding:4px 7px;border-radius:6px;font-size:14px;}
.icon-btn:hover{background:var(--bg);color:var(--navy);}

/* event / leave list */
.list-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 14px;border:1px solid var(--border);border-radius:11px;margin-bottom:8px;background:var(--card);
}
.list-row .lr-main{flex:1;min-width:0;}
.list-row .lr-title{font-weight:600;font-size:14px;}
.list-row .lr-sub{font-size:12px;color:var(--text-soft);margin-top:2px;}
.tag{display:inline-block;background:var(--green-pale);color:var(--green);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px;}
.tag.navy{background:#E7EDF7;color:var(--navy);}
.tag.amber{background:#FBF0DC;color:var(--amber);}
.tag.danger{background:#FBE7E2;color:var(--danger);}

/* pipeline cards */
.pipe-controls{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.pipe-controls select, .filter-select{
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:var(--text);
}
.chip-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.chip{
  border:1px solid var(--border);background:#fff;border-radius:20px;padding:7px 16px;font-size:12.5px;font-weight:700;color:var(--text-soft);
}
.chip.active-chip{background:var(--navy);color:#fff;border-color:var(--navy);}
.pipe-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;
}
.pipe-card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.pipe-card-head .name{font-weight:700;font-size:14.5px;}
.pipe-card-head .meta{font-size:12px;color:var(--text-soft);margin-top:3px;}
.pipe-card-body{padding:0 16px 16px;border-top:1px solid var(--border);display:none;}
.pipe-card-body.open{display:block;padding-top:12px;}
.status-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.status-New{background:#E7EDF7;color:var(--navy);}
.status-Active{background:var(--green-pale);color:var(--green);}
.status-Re-engage{background:#FBF0DC;color:var(--amber);}
.status-Not-Interested{background:#FBE7E2;color:var(--danger);}
.status-Signed{background:#DEF7E9;color:#0C7A4F;}
.chevron{transition:transform .2s;color:var(--text-soft);}
.chevron.open{transform:rotate(180deg);}

/* team sections */
.team-section{margin-bottom:24px;}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.member-card .mname{font-weight:700;font-size:14.5px;}
.member-card .mrole{font-size:11.5px;color:var(--text-soft);margin:2px 0 8px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;}
.member-card .mclients{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.member-card .mactions{display:flex;gap:6px;}

/* clients */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.client-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.client-card .cname{font-weight:700;font-size:15px;color:var(--navy);}
.client-card .clead{font-size:12px;color:var(--text-soft);margin:2px 0 8px;}
.client-card .csupport{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}

/* intel */
.intel-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.intel-card .ihead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.intel-card .ititle{font-weight:700;font-size:14px;}
.intel-card .itakeaway{display:flex;gap:8px;margin-top:8px;background:var(--green-pale);border-radius:9px;padding:9px 11px;font-size:12.5px;color:#0C5A44;}
.intel-timestamp{font-size:12px;color:var(--text-soft);margin-bottom:16px;}
.podcast-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
.podcast-row .pnum{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}

/* admin */
.admin-row{display:grid;grid-template-columns:1.4fr 0.8fr 0.8fr auto;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.admin-row.header-row{font-weight:700;color:var(--text-soft);font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid var(--border);}
.admin-row input, .admin-row select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(1,20,50,0.5);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{font-family:var(--font-display);color:var(--navy);margin:0 0 16px;font-size:19px;}
.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;color:var(--text);background:#fff;
}
.form-group textarea{resize:vertical;min-height:60px;}
.multiselect-box{border:1px solid var(--border);border-radius:8px;padding:8px;max-height:150px;overflow-y:auto;}
.multiselect-box label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:400;text-transform:none;padding:4px 2px;color:var(--text);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.empty-state{text-align:center;padding:30px 10px;color:var(--text-soft);font-size:13.5px;}

@media(max-width:640px){
  main{padding:14px;}
  .topbar-left .brand-text{font-size:14px;}
  h1.page-title{font-size:21px;}
  .admin-row{grid-template-columns:1fr;gap:4px;}
}
</style>
</head>

/* ---------------- UTIL ---------------- */
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d){
  if(!d) return "";
  try{
    const dt = new Date(d+"T00:00:00");
    if(isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }catch(e){ return d; }
}

function nameToId(name){ const m = DATA.team.find(t=>t.name===name); return m?m.id:null; }

/* ---------------- PIN SCREEN ---------------- */
let pinBuffer = "";
let pinSelectedMember = null;

function buildKeypad(){
  const kp = document.getElementById('pin-keypad');
  kp.innerHTML = "";
  const keys = ['1','2','3','4','5','6','7','8','9','clear','0','back'];
  keys.forEach(k=>{
    const btn = document.createElement('button');
    btn.className = 'pin-key' + (k==='clear'||k==='back' ? ' wide':'');
    btn.textContent = k==='clear' ? 'Clear' : (k==='back' ? '⌫' : k);
    btn.addEventListener('click', ()=>handlePinKey(k));
    kp.appendChild(btn);
  });
}

function handlePinKey(k){
  if(k==='clear'){ pinBuffer=""; }
  else if(k==='back'){ pinBuffer = pinBuffer.slice(0,-1); }
  else { if(pinBuffer.length<4) pinBuffer += k; }
  updatePinDots();
  if(pinBuffer.length===4){ attemptLogin(pinBuffer); }
}

function updatePinDots(){
  const dots = document.querySelectorAll('#pin-dots .pin-dot');
  dots.forEach((d,i)=> d.classList.toggle('filled', i < pinBuffer.length));
}

function attemptLogin(pin){
  const errEl = document.getElementById('pin-error');
  const nameEl = document.getElementById('pin-name-display');
  const member = DATA.team.find(t=>t.pin===pin);

  if(session.lockUntil[pin] && Date.now() < session.lockUntil[pin]){
    const secs = Math.ceil((session.lockUntil[pin]-Date.now())/1000);
    errEl.textContent = "Locked. Try again in " + secs + "s.";
    pinBuffer=""; updatePinDots();
    return;
  }

  if(member){
    delete session.attempts[pin];
    delete session.lockUntil[pin];
    saveSession();
    nameEl.textContent = member.name;
    errEl.textContent = "";
    setTimeout(()=>loginAs(member.id), 250);
  } else {
    session.attempts[pin] = (session.attempts[pin]||0) + 1;
    if(session.attempts[pin] >= 3){
      session.lockUntil[pin] = Date.now() + 30000;
      errEl.textContent = "Too many attempts. Locked 30s.";
    } else {
      errEl.textContent = "Incorrect PIN (" + (3-session.attempts[pin]) + " attempts left)";
    }
    saveSession();
    pinBuffer = "";
    updatePinDots();
  }
}

function loginAs(userId){
  session.userId = userId;
  saveSession();
  pinBuffer = "";
  showApp();
}

function showPinScreen(){
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('active');
  pinBuffer = "";
  pinSelectedMember = null;
  document.getElementById('pin-name-display').textContent = "\u00A0";
  document.getElementById('pin-error').textContent = "\u00A0";
  updatePinDots();
  document.getElementById('pin-tagline').textContent = TAGLINES[Math.floor(Math.random()*TAGLINES.length)];
}

function showApp(){
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  const u = currentUser();
  document.getElementById('current-user-name').textContent = u.name;
  document.getElementById('current-user-level').textContent = levelLabel(u.level);
  document.getElementById('header-tagline').textContent = TAGLINES[Math.floor(Math.random()*TAGLINES.length)];
  buildTabbar();
  renderAll();
}

  const m = editing ? DATA.team.find(x=>x.id===id) : {name:'',pin:'',level:2,category:'BD Leads',clients:[]};
  const clientNames = DATA.clients.map(c=>c.name);
  const html = `
    <h3>${editing?'Edit':'Add'} Team Member</h3>
    <div class="form-group"><label>Name</label><input id="mf-name" value="${esc(m.name)}"></div>
    <div class="form-group"><label>PIN (4 digits)</label><input id="mf-pin" maxlength="4" value="${esc(m.pin)}"></div>
    <div class="form-group"><label>Category</label>
      <select id="mf-cat">${TEAM_CATEGORIES.map(c=>`<option ${m.category===c?'selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Permission Level</label>
      <select id="mf-level">
        <option value="1" ${m.level==1?'selected':''}>Level 1 — Admin</option>
        <option value="2" ${m.level==2?'selected':''}>Level 2 — Lead</option>
        <option value="3" ${m.level==3?'selected':''}>Level 3 — Analyst</option>
      </select>
    </div>
    <div class="form-group"><label>Client Assignments</label>
      <div class="multiselect-box" id="mf-clients">
        ${clientNames.map(cn=>`<label><input type="checkbox" value="${esc(cn)}" ${ (m.clients||[]).includes(cn)?'checked':''}> ${esc(cn)}</label>`).join('') || '<div class="lr-sub">No clients yet.</div>'}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn outline" id="mf-cancel">Cancel</button>
      <button class="btn green" id="mf-save">Save</button>
    </div>
  `;
  openModal(html);
  document.getElementById('mf-cancel').addEventListener('click', closeModal);
  document.getElementById('mf-save').addEventListener('click', ()=>{
    const name = document.getElementById('mf-name').value.trim();
    const pin = document.getElementById('mf-pin').value.trim();
    if(!name || !/^\d{4}$/.test(pin)){ alert('Name and a 4-digit PIN are required.'); return; }
    const dupe = DATA.team.find(t=> t.pin===pin && t.id!==id);
    if(dupe){ alert('That PIN is already in use by ' + dupe.name); return; }
    const clients = Array.from(document.querySelectorAll('#mf-clients input:checked')).map(i=>i.value);
    const vals = { name, pin, category: document.getElementById('mf-cat').value, level: parseInt(document.getElementById('mf-level').value,10), clients };
    if(editing){ Object.assign(m, vals); }
    else { DATA.team.push({id:uid('t'), ...vals}); }
    saveData(); closeModal(); renderTeam();
  });
}

/* ================= CLIENTS TAB (Level 1 only) ================= */
const CLIENT_LEADS = ["Brian Long","Christian","Brad"];

function renderClients(){
  const el = document.getElementById('tab-clients');
  el.innerHTML = `
    <h1 class="page-title">Clients</h1>
    <p class="page-sub">Active client accounts by lead.</p>
    <div style="margin-bottom:18px;"><button class="btn green small" id="add-client-btn">+ Add Client</button></div>
    <div id="client-sections"></div>
  `;
  document.getElementById('add-client-btn').addEventListener('click', ()=>openClientModal());

  const wrap = document.getElementById('client-sections');
  const leadsPresent = [...new Set(DATA.clients.map(c=>c.lead))];
  const orderedLeads = [...CLIENT_LEADS.filter(l=>leadsPresent.includes(l)), ...leadsPresent.filter(l=>!CLIENT_LEADS.includes(l))];

  if(DATA.clients.length===0){ wrap.innerHTML = `<div class="empty-state">No clients yet. Add one to get started.</div>`; return; }

  wrap.innerHTML = orderedLeads.map(lead=>{
    const clients = DATA.clients.filter(c=>c.lead===lead);
    return `
      <div class="team-section">
        <div class="section-head"><h2>${esc(lead)}'s Clients</h2></div>
        <div class="client-grid">
          ${clients.map(c=>`
            <div class="client-card">
              <div class="cname">${esc(c.name)}</div>
              <div class="clead">Lead: ${esc(c.lead)}</div>
              <div class="csupport">${(c.supporting||[]).map(s=>`<span class="tag navy">${esc(s)}</span>`).join('') || '<span class="lr-sub">No supporting team</span>'}</div>
              <div class="mactions">
                <button class="btn small outline edit-client-btn" data-id="${c.id}">Edit</button>
                <button class="btn small danger del-client-btn" data-id="${c.id}">Delete</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  wrap.querySelectorAll('.edit-client-btn').forEach(b=>b.addEventListener('click', e=>openClientModal(e.target.dataset.id)));
  wrap.querySelectorAll('.del-client-btn').forEach(b=>b.addEventListener('click', e=>{
    if(confirm('Delete this client?')){
      DATA.clients = DATA.clients.filter(x=>x.id!==e.target.dataset.id);
      saveData(); renderClients();
    }
  }));
}

function openClientModal(id){
  const editing = !!id;
  const c = editing ? DATA.clients.find(x=>x.id===id) : {name:'',lead:CLIENT_LEADS[0],supporting:[]};
  const html = `
    <h3>${editing?'Edit':'Add'} Client</h3>
    <div class="form-group"><label>Client Name</label><input id="cf-name" value="${esc(c.name)}"></div>
    <div class="form-group"><label>Lead (determines section)</label>
      <select id="cf-lead">${CLIENT_LEADS.map(l=>`<option ${c.lead===l?'selected':''}>${l}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Supporting Team (multi-select)</label>
      <div class="multiselect-box" id="cf-supporting">
        ${DATA.team.map(t=>`<label><input type="checkbox" value="${esc(t.name)}" ${(c.supporting||[]).includes(t.name)?'checked':''}> ${esc(t.name)}</label>`).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn outline" id="cf-cancel">Cancel</button>
      <button class="btn green" id="cf-save">Save</button>
    </div>
  `;
  openModal(html);
  document.getElementById('cf-cancel').addEventListener('click', closeModal);
  document.getElementById('cf-save').addEventListener('click', ()=>{
    const name = document.getElementById('cf-name').value.trim();
    if(!name){ alert('Client name is required.'); return; }
    const supporting = Array.from(document.querySelectorAll('#cf-supporting input:checked')).map(i=>i.value);
    const vals = { name, lead: document.getElementById('cf-lead').value, supporting };
    if(editing){ Object.assign(c, vals); }
    else { DATA.clients.push({id:uid('c'), notes:'', ...vals}); }
    saveData(); closeModal(); renderClients(); renderHome();
  });
}

/* ================= INTEL TAB ================= */
let intelFilter = '';

function renderIntel(){
  const u = currentUser();
  const el = document.getElementById('tab-intel');
  const lastUpdated = DATA.intel.reduce((max,i)=> i.ts>max?i.ts:max, '');
  const filterOptions = [...new Set([...DATA.intel.map(i=>i.person), ...DATA.intel.map(i=>i.client).filter(Boolean)])];

  el.innerHTML = `
    <h1 class="page-title">Intel</h1>
    <div class="intel-timestamp">Last updated: ${esc(fmtDate(lastUpdated)) || 'N/A'}</div>
    <div class="pipe-controls">
      <select id="intel-filter" class="filter-select">
        <option value="">All</option>
        ${filterOptions.map(f=>`<option value="${esc(f)}" ${intelFilter===f?'selected':''}>${esc(f)}</option>`).join('')}
      </select>
      ${u.level<=2 ? `<button class="btn green small" id="add-intel-btn">+ Pull Intel</button>` : ``}
    </div>
    <div id="intel-list"></div>

    <div class="section-block" style="margin-top:30px;">
      <div class="section-head"><h2>GovCon Podcasts</h2></div>
      <div id="podcast-list"></div>
    </div>
  `;
  document.getElementById('intel-filter').addEventListener('change', e=>{ intelFilter=e.target.value; renderIntel(); });
  const addBtn = document.getElementById('add-intel-btn');
  if(addBtn) addBtn.addEventListener('click', ()=>openIntelModal());

  const list = document.getElementById('intel-list');
  let items = [...DATA.intel];
  if(intelFilter) items = items.filter(i=> i.person===intelFilter || i.client===intelFilter);
  items.sort((a,b)=> (b.ts||"").localeCompare(a.ts||""));
  if(items.length===0){ list.innerHTML = `<div class="empty-state">No intel articles match this filter.</div>`; }
  else {
    list.innerHTML = items.map(i=>`
      <div class="intel-card">
        <div class="ihead">
          <div>
            <div class="ititle">${esc(i.title)}</div>
            <div class="lr-sub">${esc(i.person)}${i.client?(' &middot; '+esc(i.client)):''} &middot; ${esc(fmtDate(i.ts))}</div>
          </div>
          ${u.level<=2 ? `<button class="icon-btn del-intel-btn" data-id="${i.id}">Delete</button>` : ``}
        </div>
        <div class="itakeaway">💡 ${esc(i.takeaway)}</div>
      </div>
    `).join('');
    list.querySelectorAll('.del-intel-btn').forEach(b=>b.addEventListener('click', e=>{
      if(confirm('Delete this intel item?')){
        DATA.intel = DATA.intel.filter(x=>x.id!==e.target.dataset.id);
        saveData(); renderIntel();
      }
    }));
  }

  const podWrap = document.getElementById('podcast-list');
  podWrap.innerHTML = DATA.podcasts.map((p,idx)=>`
    <div class="podcast-row">
      <div class="pnum">${idx+1}</div>
      <div>
        <div class="lr-title">${esc(p.title)}</div>
        <div class="lr-sub">${esc(p.guest)} &middot; ${esc(p.note)}</div>
      </div>
    </div>
  `).join('');
}

function openIntelModal(id){
  const editing = !!id;
  const i = editing ? DATA.intel.find(x=>x.id===id) : {title:'',person:teamNames()[0]||'',client:'',takeaway:'',ts:new Date().toISOString().slice(0,10)};
  const html = `
    <h3>${editing?'Edit':'Add'} Intel</h3>
    <div class="form-group"><label>Title</label><input id="if-title" value="${esc(i.title)}"></div>
    <div class="form-group"><label>Person</label>
      <select id="if-person">${teamNames().map(n=>`<option ${i.person===n?'selected':''}>${esc(n)}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Client (optional)</label>
      <select id="if-client"><option value="">-- None --</option>${DATA.clients.map(c=>`<option ${i.client===c.name?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Key Takeaway</label><textarea id="if-takeaway">${esc(i.takeaway)}</textarea></div>
    <div class="modal-actions">
      <button class="btn outline" id="if-cancel">Cancel</button>
      <button class="btn green" id="if-save">Save</button>
    </div>
  `;
  openModal(html);
  document.getElementById('if-cancel').addEventListener('click', closeModal);
  document.getElementById('if-save').addEventListener('click', ()=>{
    const title = document.getElementById('if-title').value.trim();
    if(!title){ alert('Title is required.'); return; }
    const vals = {
      title,
      person: document.getElementById('if-person').value,
      client: document.getElementById('if-client').value,
      takeaway: document.getElementById('if-takeaway').value.trim(),
      ts: new Date().toISOString().slice(0,10)
    };
    if(editing){ Object.assign(i, vals); }
    else { DATA.intel.push({id:uid('i'), ...vals}); }
    saveData(); closeModal(); renderIntel();
  });
}

/* ================= ADMIN TAB (Level 1 only) ================= */
function renderAdmin(){
  const el = document.getElementById('tab-admin');
  el.innerHTML = `
    <h1 class="page-title">Admin</h1>
    <p class="page-sub">Manage PINs and permission levels for the whole team.</p>
    <div class="card" style="overflow-x:auto;">
      <div class="admin-row header-row">
        <div>Name</div><div>PIN</div><div>Level</div><div></div>
      </div>
      <div id="admin-rows"></div>
    </div>
  `;
  const rows = document.getElementById('admin-rows');
  rows.innerHTML = DATA.team.map(m=>`
    <div class="admin-row" data-id="${m.id}">
      <div>${esc(m.name)}</div>
      <div><input type="text" maxlength="4" class="admin-pin" value="${esc(m.pin)}"></div>
      <div>
        <select class="admin-level">
          <option value="1" ${m.level==1?'selected':''}>Level 1</option>
          <option value="2" ${m.level==2?'selected':''}>Level 2</option>
          <option value="3" ${m.level==3?'selected':''}>Level 3</option>
        </select>
      </div>
      <div><button class="btn small green admin-save-btn">Save</button></div>
    </div>
  `).join('');

  rows.querySelectorAll('.admin-save-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const row = e.target.closest('.admin-row');
      const id = row.dataset.id;
      const m = DATA.team.find(t=>t.id===id);
      const newPin = row.querySelector('.admin-pin').value.trim();
      const newLevel = parseInt(row.querySelector('.admin-level').value,10);
      if(!/^\d{4}$/.test(newPin)){ alert('PIN must be exactly 4 digits.'); return; }
      const dupe = DATA.team.find(t=> t.pin===newPin && t.id!==id);
      if(dupe){ alert('That PIN is already used by ' + dupe.name); return; }
      m.pin = newPin; m.level = newLevel;
      saveData();
      alert('Saved ' + m.name + '.');
      if(m.id === session.userId){
        document.getElementById('current-user-level').textContent = levelLabel(m.level);
        buildTabbar(); renderAll();
      }
    });
  });
}

function openLeaveModal(){
  const html = `
    <h3>Log Leave</h3>
    <div class="form-group"><label>Team Member</label>
      <select id="lf-member">${teamNames().map(n=>`<option>${esc(n)}</option>`).join('')}</select>

    </div>
  `;
  openModal(html);
  document.getElementById('lf-cancel').addEventListener('click', closeModal);
  document.getElementById('lf-save').addEventListener('click', ()=>{

    if(!start){ alert('Start date is required.'); return; }
    DATA.leave.push({

      member: document.getElementById('lf-member').value,

      end: document.getElementById('lf-end').value || start,
      note: document.getElementById('lf-note').value.trim()
    });

  });

/* ================= MODAL HELPERS ================= */
function openModal(html){
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-content').innerHTML = '';
}
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target.id === 'modal-overlay') closeModal();
});

/* ================= LOGOUT ================= */
document.getElementById('logout-btn').addEventListener('click', ()=>{
  session.userId = null;
  saveSession();
  showPinScreen();
});

/* ================= SERVICE WORKER ================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ================= INIT ================= */
loadData();
loadSession();
buildKeypad();
if(session.userId && DATA.team.find(t=>t.id===session.userId)){
  showApp();
} else {
  showPinScreen();
}

})();

</script>
