<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BL Gov CC">
<meta name="theme-color" content="#012D6C">
<title>BL Gov Command Center</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav:#012D6C;--grn:#00956E;
  --nav-lt:#E6ECF8;--grn-lt:#E0F5EF;
  --nav-dk:#001A45;--grn-dk:#005C43;
  --s0:#F5F5F5;--s1:#EFEFEF;--s2:#FFFFFF;
  --tp:#1A1A1A;--ts:#666666;
  --bd:rgba(0,0,0,0.12);--r:8px;
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
body{background:var(--s0);font-family:var(--ff);min-height:100vh}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:var(--nav);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:1000}
#pin-screen.hidden{display:none}
.pin-logo{width:280px;max-width:90%;margin-bottom:8px;filter:brightness(0) invert(1)}
.pin-tagline{color:var(--grn);font-size:13px;font-weight:500;text-align:center;margin-bottom:32px;letter-spacing:0.03em}
.pin-user{color:rgba(255,255,255,0.7);font-size:11px;text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.06em}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;transition:all 0.15s}
.pin-dot.filled{background:var(--grn);border-color:var(--grn)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;justify-content:center}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:22px;font-weight:400;cursor:pointer;font-family:var(--ff);display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.pin-btn:active{background:rgba(255,255,255,0.2);transform:scale(0.95)}
.pin-btn.del{font-size:18px}
.pin-btn.empty{border:none;background:transparent;cursor:default}
.pin-error{color:#FF6B6B;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.pin-switch{color:rgba(255,255,255,0.5);font-size:11px;text-align:center;margin-top:20px;cursor:pointer;text-decoration:underline}

/* MAIN APP */
#main-app{display:none;padding:12px;max-width:420px;margin:0 auto;padding-bottom:20px}
#main-app.visible{display:block}

/* HEADER */
.hdr{background:var(--nav);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.hdr-logo{width:38px;height:38px;border-radius:7px;background:#fff;padding:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo img{width:34px;height:34px;object-fit:contain}
.hdr-info{flex:1}
.hdr-info h1{font-size:13px;font-weight:500;color:#fff}
.hdr-info p{font-size:10px;color:rgba(255,255,255,0.6)}
.hdr-user{font-size:11px;color:var(--grn);font-weight:500;text-align:right}
.hdr-logout{font-size:10px;color:rgba(255,255,255,0.4);cursor:pointer;text-align:right;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--s1);border-radius:var(--r);padding:3px;overflow-x:auto}
.tab{flex:1;min-width:0;padding:6px 2px;font-size:10px;border:none;background:transparent;color:var(--ts);border-radius:6px;cursor:pointer;font-family:var(--ff);display:flex;align-items:center;justify-content:center;gap:2px;white-space:nowrap}
.tab.active{background:var(--nav);color:#fff;font-weight:500}
.sec{display:none}.sec.active{display:block}

/* CARDS */
.card{background:var(--s2);border:0.5px solid var(--bd);border-radius:12px;padding:11px 12px;margin-bottom:8px}
.ch{display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;color:#fff}
.n{background:var(--nav)}.g{background:var(--grn)}.g2{background:#1D9E75}.g3{background:#0F6E56}.bv{background:#185FA5}
.nm{font-size:13px;font-weight:500;color:var(--tp)}
.rl{font-size:11px;color:var(--ts)}
.sp{font-size:10px;padding:2px 7px;border-radius:20px;margin-left:auto;white-space:nowrap;font-weight:500;flex-shrink:0}
.sa{background:var(--nav-lt);color:var(--nav-dk)}
.ss{background:var(--grn-lt);color:var(--grn-dk)}
.sr{background:#FFF8E0;color:#7A5500}
.sc{background:var(--s1);color:var(--ts)}
.sw{background:#FCE4D6;color:#993C1D}
.dv2{height:0.5px;background:var(--bd);margin:7px 0}
.dr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;gap:8px}
.dl{color:var(--ts);flex-shrink:0}.dv{color:var(--tp);text-align:right}
.bdg{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.bx{font-size:10px;padding:2px 7px;border-radius:20px;border:0.5px solid}
.bn{background:var(--nav-lt);color:var(--nav-dk);border-color:#8FAAD4}
.bg{background:var(--grn-lt);color:var(--grn-dk);border-color:#5DCAA5}
.bx3{background:var(--s1);color:var(--ts);border-color:var(--bd)}

/* SECTION LABEL */
.sl{font-size:10px;font-weight:500;color:var(--grn);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.sl::after{content:"";flex:1;height:0.5px;background:var(--grn-lt)}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dash-card{background:var(--s2);border:0.5px solid var(--bd);border-radius:12px;padding:12px;text-align:center}
.dash-n{font-size:28px;font-weight:500;color:var(--nav)}
.dash-l{font-size:11px;color:var(--ts);margin-top:2px}
.dash-wide{grid-column:1/-1}
.activity-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd);font-size:12px}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ad-nav{background:var(--nav)}.ad-grn{background:var(--grn)}

/* PIPELINE */
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.chip{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r);padding:7px 4px;text-align:center}
.cn{font-size:18px;font-weight:500;color:var(--tp)}.cl{font-size:10px;color:var(--ts);margin-top:1px}

.sort-bar{display:flex;gap:6px;margin-bottom:10px;align-items:center}
.sort-bar label{font-size:11px;color:var(--ts);white-space:nowrap}
.sort-bar select{flex:1;padding:5px 8px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--s2);color:var(--tp);font-size:11px;font-family:var(--ff)}

.p-card{background:var(--s2);border:0.5px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden}
.p-header{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.p-header:hover{background:var(--s1)}
.p-body{padding:0 12px 10px;border-top:0.5px solid var(--bd)}
.p-actions{display:flex;gap:6px;margin-top:8px}
.p-btn{flex:1;padding:6px;border-radius:var(--r);border:0.5px solid var(--bd);font-size:11px;cursor:pointer;font-family:var(--ff);background:transparent;color:var(--ts)}
.p-btn.edit{background:var(--nav-lt);color:var(--nav-dk);border-color:#8FAAD4}

.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border:0.5px dashed var(--grn);border-radius:12px;background:transparent;color:var(--grn);font-size:12px;cursor:pointer;font-family:var(--ff);margin-bottom:10px}
.add-btn:hover{background:var(--grn-lt)}

/* MODALS */
.mw{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;z-index:100;padding:0}
.mw.open{display:flex}
.modal{background:var(--s2);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;color:var(--tp);margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid var(--bd)}
.fl{display:flex;flex-direction:column;gap:8px}
.fl label{font-size:11px;color:var(--ts)}
.fl input,.fl select,.fl textarea{width:100%;padding:7px 10px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--s1);color:var(--tp);font-size:12px;font-family:var(--ff)}
.fl textarea{resize:vertical;min-height:52px}
.mb2{display:flex;gap:8px;margin-top:10px}
.mb2 button{flex:1;padding:8px;border-radius:var(--r);border:0.5px solid var(--bd);font-size:12px;cursor:pointer;font-family:var(--ff)}
.sav{background:var(--nav);color:#fff;border-color:var(--nav)}
.can{background:transparent;color:var(--ts)}
.del-btn{background:#FCE4D6;color:#993C1D;border-color:#F5B8A0}

/* TEAM */
.tm-card{background:var(--s2);border:0.5px solid var(--bd);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:9px}
.tm-info{flex:1;min-width:0}
.tm-edit{font-size:20px;color:var(--ts);cursor:pointer;padding:4px}

/* CLIENTS */
.cl-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:0.5px solid var(--bd)}
.cl-row:last-child{border-bottom:none}
.cli{flex:1;min-width:0}
.cn2{font-size:12px;font-weight:500;color:var(--tp)}
.cs{font-size:11px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl2{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--nav-lt);color:var(--nav-dk);border:0.5px solid #8FAAD4;white-space:nowrap}
.cl-edit{font-size:16px;color:var(--ts);cursor:pointer;padding:4px;flex-shrink:0}

/* INTEL */
.intel-sort{display:flex;gap:6px;margin-bottom:10px;align-items:center}
.intel-sort label{font-size:11px;color:var(--ts);white-space:nowrap}
.intel-sort select{flex:1;padding:5px 8px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--s2);color:var(--tp);font-size:11px;font-family:var(--ff)}
.ni{background:var(--s2);border:0.5px solid var(--bd);border-left:3px solid var(--grn);border-radius:0 12px 12px 0;padding:9px 11px;margin-bottom:7px}
.nt{font-size:12px;font-weight:500;color:var(--tp);margin-bottom:3px;line-height:1.4}
.nk{font-size:11px;color:var(--ts);margin-bottom:4px;line-height:1.4;font-style:italic}
.nm2{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;margin-top:5px}
.ntg{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--nav-lt);color:var(--nav-dk);border:0.5px solid #8FAAD4}
.nla{font-size:10px;color:var(--grn);text-decoration:none}

.pod-card{background:var(--s2);border:0.5px solid var(--bd);border-left:3px solid var(--nav);border-radius:0 12px 12px 0;padding:9px 11px;margin-bottom:7px}
.pod-title{font-size:12px;font-weight:500;color:var(--tp);margin-bottom:2px}
.pod-ep{font-size:11px;color:var(--ts);margin-bottom:3px}
.pod-why{font-size:11px;color:var(--ts);font-style:italic;margin-bottom:4px;line-height:1.4}
.pod-meta{display:flex;justify-content:space-between;align-items:center}

.rfb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--grn);background:var(--grn-lt);border:0.5px solid var(--grn);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--ff);margin-bottom:12px}
</style>
</head>

// ── PIN LOGIC ─────────────────────────────────────────────────────────────────
let pinEntry = '';
let currentUser = null;
let failCount = 0;
let lockout = false;

function pinInput(n) {
  if(lockout || pinEntry.length >= 4) return;
  pinEntry += n;
  updateDots();
  if(pinEntry.length === 4) setTimeout(checkPin, 200);
}

function pinDel() {
  pinEntry = pinEntry.slice(0,-1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for(let i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length);
  }
}

function checkPin() {
  const user = USERS.find(u => u.pin === pinEntry);
  if(user) {
    failCount = 0;
    currentUser = user;
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('main-app').classList.add('visible');
    document.getElementById('hdr-user').textContent = user.name;
    setupPermissions(user.level);
    renderDashboard();
    renderProspects();
    renderTeam();
    renderClients();
    renderIntel();
  } else {
    failCount++;
    pinEntry = '';
    updateDots();
    if(failCount >= 3) {
      lockout = true;
      document.getElementById('pin-error').textContent = 'Too many attempts. Try again in 30 seconds.';
      setTimeout(() => { lockout = false; failCount = 0; document.getElementById('pin-error').textContent = ''; }, 30000);
    } else {
      document.getElementById('pin-error').textContent = 'Incorrect PIN. ' + (3-failCount) + ' attempts remaining.';
    }
  }
}

function switchUser() {
  pinEntry = '';
  updateDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-user-label').textContent = 'Enter your PIN';
}

function logout() {
  currentUser = null;
  pinEntry = '';
  updateDots();
  document.getElementById('pin-screen').classList.remove('hidden');
  document.getElementById('main-app').classList.remove('visible');
  document.getElementById('pin-error').textContent = '';
}

function setupPermissions(level) {
  const ct = document.getElementById('clients-tab');
  const atb = document.getElementById('add-team-btn');
  if(level > 1) {
    ct.style.display = 'none';
  } else {
    ct.style.display = '';
  }
  if(level > 1) {
    atb.style.display = 'none';
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const AVC = ['n','g','g2','g3','bv'];
const SC = {Active:'sa',Signed:'ss','Re-engage':'sr',Cold:'sc','New Lead':'sw'};
function ini(s) { return s.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function avc(s) { let n=0; for(let c of s) n+=c.charCodeAt(0); return AVC[n%AVC.length]; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const active = prospects.filter(p=>p.st==='Active'||p.st==='New Lead').length;
  document.getElementById('dash-stats').innerHTML = `
    <div class="dash-card"><div class="dash-n" style="color:var(--nav)">${clients.length}</div><div class="dash-l">Active clients</div></div>
    <div class="dash-card"><div class="dash-n" style="color:var(--grn)">${active}</div><div class="dash-l">Active pipeline</div></div>
    <div class="dash-card"><div class="dash-n">${teamMembers.length}</div><div class="dash-l">Team members</div></div>
    <div class="dash-card"><div class="dash-n" style="color:#7A5500">${prospects.filter(p=>p.st==='Re-engage').length}</div><div class="dash-l">Re-engage</div></div>
  `;
  const meetings = prospects.filter(p=>p.meet && p.meet!=='TBD' && p.meet!=='Pending');
  document.getElementById('dash-meetings').innerHTML = meetings.length ? meetings.slice(0,3).map(p=>`
    <div class="activity-item"><div class="activity-dot ad-nav"></div><div><strong>${p.co}</strong> — ${p.meet}</div></div>`).join('') :
    '<div class="activity-item"><div class="activity-dot ad-grn"></div><div>No upcoming meetings scheduled</div></div>';
  document.getElementById('dash-activity').innerHTML = prospects.slice(0,4).map(p=>`
    <div class="activity-item"><div class="activity-dot ${p.st==='Active'?'ad-nav':'ad-grn'}"></div><div><strong>${p.co}</strong> — ${p.st} · ${p.lead}</div></div>`).join('');
  document.getElementById('dash-intel').innerHTML = intelItems.slice(0,2).map(item=>`
    <div class="ni"><div class="nt">${item.title}</div><div class="nk">${item.key}</div></div>`).join('');
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
let editingProspectIdx = null;
function renderProspects() {
  let sorted = [...prospects];
  const s = document.getElementById('pipe-sort')?.value || 'none';
  if(s==='lead') sorted.sort((a,b)=>a.lead.localeCompare(b.lead));
  else if(s==='src') sorted.sort((a,b)=>a.src.localeCompare(b.src));
  else if(s==='st') sorted.sort((a,b)=>a.st.localeCompare(b.st));
  let t=0,a=0,sg=0,r=0;
  prospects.forEach(p=>{t++;if(p.st==='Active'||p.st==='New Lead')a++;if(p.st==='Signed')sg++;if(p.st==='Re-engage')r++;});
  document.getElementById('tot').textContent=t;
  document.getElementById('act-c').textContent=a;
  document.getElementById('sgn-c').textContent=sg;
  document.getElementById('re-c').textContent=r;
  document.getElementById('prospect-list').innerHTML = sorted.map((p,i)=>{
    const origIdx = prospects.indexOf(p);
    return `<div class="p-card">
      <div class="p-header" onclick="toggleProspect(this)">
        <div class="av ${avc(p.co)}">${ini(p.co)}</div>
        <div style="flex:1;min-width:0"><div class="nm">${p.co}</div><div class="rl">${p.lead} · ${p.src}</div></div>
        <span class="sp ${SC[p.st]||'sc'}">${p.st}</span>
        <i class="ti ti-chevron-down" style="color:var(--ts);margin-left:6px;font-size:14px"></i>
      </div>
      <div class="p-body" style="display:none">
        <div class="dr"><span class="dl">POC</span><span class="dv">${p.poc}</span></div>
        <div class="dr"><span class="dl">Industry</span><span class="dv">${p.ind}</span></div>
        <div class="dr"><span class="dl">Next meeting</span><span class="dv">${p.meet}</span></div>
        ${p.notes?`<div class="dr" style="margin-top:2px"><span class="dl">Notes</span><span class="dv" style="font-size:10px;color:var(--ts)">${p.notes}</span></div>`:''}
        <div class="p-actions">
          <button class="p-btn edit" onclick="openProspectModal(${origIdx})"><i class="ti ti-edit"></i> Edit</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleProspect(el) {
  const body = el.nextElementSibling;
  const icon = el.querySelector('.ti-chevron-down, .ti-chevron-up');
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  if(icon) { icon.className = open ? 'ti ti-chevron-down' : 'ti ti-chevron-up'; icon.style.cssText='color:var(--ts);margin-left:6px;font-size:14px'; }
}

function openProspectModal(idx) {
  editingProspectIdx = idx !== undefined ? idx : null;
  const p = idx !== undefined ? prospects[idx] : null;
  document.getElementById('prospect-modal-title').textContent = p ? 'Edit prospect' : 'Add prospect';
  document.getElementById('f-co').value = p?.co||'';
  document.getElementById('f-poc').value = p?.poc||'';
  document.getElementById('f-src').value = p?.src||'';
  document.getElementById('f-ind').value = p?.ind||'';
  document.getElementById('f-st').value = p?.st||'Active';
  document.getElementById('f-ld').value = p?.lead||'Brian';
  document.getElementById('f-mt').value = p?.meet||'';
  document.getElementById('f-nt').value = p?.notes||'';
  document.getElementById('prospect-del-btn').style.display = p ? 'block' : 'none';
  document.getElementById('prospectModal').classList.add('open');
}

function saveProspect() {
  const obj = {
    co:document.getElementById('f-co').value.trim(),
    poc:document.getElementById('f-poc').value||'TBD',
    src:document.getElementById('f-src').value||'',
    ind:document.getElementById('f-ind').value||'',
    st:document.getElementById('f-st').value,
    lead:document.getElementById('f-ld').value,
    meet:document.getElementById('f-mt').value||'TBD',
    notes:document.getElementById('f-nt').value||''
  };
  if(!obj.co) return;
  if(editingProspectIdx !== null) prospects[editingProspectIdx] = obj;
  else prospects.unshift(obj);
  renderProspects();
  renderDashboard();
  closeModal('prospectModal');
}

function deleteProspect() {
  if(editingProspectIdx === null) return;
  prospects.splice(editingProspectIdx,1);
  renderProspects();
  renderDashboard();
  closeModal('prospectModal');
}

    html += `<div class="sl">${sec}</div>`;
    members.forEach((m,i) => {
      const origIdx = teamMembers.indexOf(m);
      html += `<div class="tm-card">
        <div class="av ${avc(m.name)}">${ini(m.name)}</div>
        <div class="tm-info">
          <div class="nm">${m.name}</div>
          <div class="rl">${m.role}</div>
          ${m.clients?`<div style="font-size:10px;color:var(--ts);margin-top:2px">${m.clients}</div>`:''}
          <div class="bdg">${m.specs.map(s=>`<span class="bx bx3">${s}</span>`).join('')}</div>
        </div>
        ${canEdit?`<div class="tm-edit" onclick="openTeamModal(${origIdx})"><i class="ti ti-pencil"></i></div>`:''}
      </div>`;
    });
  });
  document.getElementById('team-list').innerHTML = html;
}

    name:document.getElementById('tm-name').value.trim(),
    role:document.getElementById('tm-role').value,
    section:document.getElementById('tm-section').value,
    clients:document.getElementById('tm-clients').value,
    specs:document.getElementById('tm-spec').value.split(',').map(s=>s.trim()).filter(Boolean),
    pin:document.getElementById('tm-pin').value,
    level:parseInt(document.getElementById('tm-perm').value)
  };
  if(!obj.name) return;
  if(editingTeamIdx !== null) teamMembers[editingTeamIdx] = obj;
  else teamMembers.push(obj);
  renderTeam();
  closeModal('teamModal');
}

function deleteTeamMember() {
  if(editingTeamIdx === null) return;
  teamMembers.splice(editingTeamIdx,1);
  renderTeam();
  closeModal('teamModal');
}

// ── CLIENTS ───────────────────────────────────────────────────────────────────
let editingClientIdx = null;
const CLIENT_GROUPS = ["Brian's clients","Brad's clients","Christian's clients"];

function renderClients() {
  let html = '';
  CLIENT_GROUPS.forEach(grp => {
    const grpClients = clients.filter(c=>c.group===grp);
    if(!grpClients.length) return;
    html += `<div class="sl">${grp}</div><div class="card" style="padding:6px 12px">`;
    grpClients.forEach(c => {
      const origIdx = clients.indexOf(c);
      html += `<div class="cl-row">
        <div class="av ${avc(c.name)}" style="width:28px;height:28px;font-size:10px">${ini(c.name)}</div>
        <div class="cli">
          <div class="cn2">${c.name}</div>
          <div class="cs">${c.focus}</div>
        </div>
        <span class="cl2">${c.lead}</span>
        <div class="cl-edit" onclick="openClientModal(${origIdx})"><i class="ti ti-pencil"></i></div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('client-list').innerHTML = html;
}

function openClientModal(idx) {
  editingClientIdx = idx !== undefined ? idx : null;
  const c = idx !== undefined ? clients[idx] : null;
  document.getElementById('client-modal-title').textContent = c ? 'Edit client' : 'Add client';
  document.getElementById('cl-name').value = c?.name||'';
  document.getElementById('cl-focus').value = c?.focus||'';
  document.getElementById('cl-lead').value = c?.lead||'Brian';
  document.getElementById('cl-group').value = c?.group||"Brian's clients";
  document.getElementById('cl-web').value = c?.web||'';
  document.getElementById('client-del-btn').style.display = c ? 'block' : 'none';
  document.getElementById('clientModal').classList.add('open');
}

function saveClient() {
  const obj = {
    name:document.getElementById('cl-name').value.trim(),
    focus:document.getElementById('cl-focus').value,
    lead:document.getElementById('cl-lead').value,
    group:document.getElementById('cl-group').value,
    web:document.getElementById('cl-web').value
  };
  if(!obj.name) return;
  if(editingClientIdx !== null) clients[editingClientIdx] = obj;
  else clients.push(obj);
  renderClients();
  renderDashboard();
  closeModal('clientModal');
}

function deleteClient() {
  if(editingClientIdx === null) return;
  clients.splice(editingClientIdx,1);
  renderClients();
  renderDashboard();
  closeModal('clientModal');
}

// ── INTEL ─────────────────────────────────────────────────────────────────────
function renderIntel() {
  const filter = document.getElementById('intel-sort')?.value || 'all';
  let filtered = filter === 'all' ? intelItems : intelItems.filter(i=>i.tags.some(t=>t.toLowerCase().includes(filter.toLowerCase())||filter.toLowerCase().includes(t.toLowerCase())));
  document.getElementById('intel-list').innerHTML = filtered.map(item=>`
    <div class="ni">
      <div class="nt">${item.title}</div>
      <div class="nk"><i class="ti ti-bulb" style="font-size:11px"></i> ${item.key}</div>
      <div class="nm2">
        <div style="display:flex;gap:4px;flex-wrap:wrap">${item.tags.map(t=>`<span class="ntg">${t}</span>`).join('')}</div>
        <a class="nla" href="${item.link}" target="_blank">Read <i class="ti ti-external-link" style="font-size:10px"></i></a>
      </div>
    </div>`).join('');
  document.getElementById('podcast-list').innerHTML = podcasts.map(p=>`
    <div class="pod-card">
      <div class="pod-title">${p.title}</div>
      <div class="pod-ep">${p.ep}</div>
      <div class="pod-why">${p.why}</div>
      <div class="pod-meta">
        <span class="ntg">${p.tag}</span>
        <a class="nla" href="${p.link}" target="_blank">Listen <i class="ti ti-external-link" style="font-size:10px"></i></a>
      </div>
    </div>`).join('');
}

// ── TAB NAV ───────────────────────────────────────────────────────────────────
function showTab(id,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
